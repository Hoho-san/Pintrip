services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pintrip
      POSTGRES_PASSWORD: pintrip
      POSTGRES_DB: pintrip
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pintrip"]
      interval: 5s
      timeout: 3s
      retries: 5
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
