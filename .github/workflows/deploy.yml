name: Deploy
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      repo_owner: ${{ steps.meta.outputs.owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "tags=ghcr.io/$owner/pintrip-backend:${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/pintrip-backend:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/pintrip-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy via SSM
        env:
          IMAGE: ghcr.io/${{ needs.build-and-push.outputs.repo_owner }}/pintrip-backend:latest
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -e

          # SSM runs as root, so ~ resolves to /root, not /home/ec2-user — use absolute paths.
          cat > /tmp/deploy-params.json <<EOF
          {
            "commands": [
              "echo '$GHCR_TOKEN' | docker login ghcr.io -u $GHCR_USER --password-stdin",
              "docker pull $IMAGE",
              "docker stop pintrip || true",
              "docker rm pintrip || true",
              "docker run -d --name pintrip --restart unless-stopped -p 8000:8000 --env-file /home/ec2-user/Pintrip/backend/.env $IMAGE",
              "docker image prune -f",
              "for i in $(seq 1 15); do if curl -sf http://localhost:8000/health > /dev/null; then echo HEALTHY; docker logs --tail 10 pintrip; exit 0; fi; sleep 1; done; echo UNHEALTHY; docker logs --tail 40 pintrip; exit 1"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy pintrip-backend ${{ github.event.workflow_run.head_sha }}" \
            --parameters file:///tmp/deploy-params.json \
            --query "Command.CommandId" --output text)

          echo "SSM command: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          echo "== stdout =="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text

          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command finished with status $STATUS"
            echo "== stderr =="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
